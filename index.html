<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雨中荷塘金鱼</title>
    <script>
      if (location.protocol === "file:") {
        location.replace("https://scsocesong.github.io/fishing/");
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <section class="intro-panel" aria-label="game introduction">
      <h1>雨天荷塘捞金鱼</h1>
      <p>Catch goldfish in a rainy lotus pond.</p>
      <p class="intro-note">通关后分享给朋友 / Share your win with friends</p>
    </section>
    <div class="hud" aria-label="scene controls">
      <button id="rainToggle" class="icon-button is-active" type="button" title="雨势自动变化">
        <span aria-hidden="true">☂</span>
      </button>
      <button id="soundToggle" class="icon-button is-active" type="button" title="声音已默认开启">
        <span aria-hidden="true">♫</span>
      </button>
    </div>
    <div class="score-panel" aria-live="polite">
      <div class="score-count"><span id="scoreValue">0</span>/30</div>
      <div id="scoreMarkers" class="score-markers" aria-label="捕鱼分数"></div>
    </div>
    <a
      class="creator-badge"
      href="https://github.com/scsocesong/fishing"
      target="_blank"
      rel="noopener noreferrer"
      title="GitHub · scsoce"
      aria-label="GitHub fishing project, scsoce"
    >
      <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 .7a12 12 0 0 0-3.8 23.4c.6.1.8-.2.8-.6v-2.1c-3.3.7-4-1.4-4-1.4-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.6.1-3.2 0 0 1-.3 3.3 1.2a11.3 11.3 0 0 1 6 0c2.3-1.5 3.3-1.2 3.3-1.2.6 1.6.2 2.9.1 3.2.8.9 1.2 2 1.2 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .4.2.7.8.6A12 12 0 0 0 12 .7Z" />
      </svg>
      <span>GitHub · scsoce</span>
    </a>
    <aside class="contact-panel" aria-label="custom game contact">
      <strong>定制互动小游戏</strong>
      <span>Custom web games</span>
      <span>WeChat ID: scsoce</span>
    </aside>
    <div id="successBanner" class="success-banner" hidden>
      <strong>捕鱼成功</strong>
      <span>Goldfish catch complete</span>
      <small>喜欢就分享给朋友 / Share this rainy pond with friends</small>
      <small>定制互动网页: WeChat scsoce / Custom games: WeChat scsoce</small>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
