<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雨中荷塘金鱼</title>
    <script>
      if (location.protocol === "file:") {
        location.replace("https://scsocesong.github.io/fishing/");
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud" aria-label="scene controls">
      <button id="rainToggle" class="icon-button is-active" type="button" title="雨势自动变化">
        <span aria-hidden="true">☂</span>
      </button>
      <button id="soundToggle" class="icon-button is-active" type="button" title="声音已默认开启">
        <span aria-hidden="true">♫</span>
      </button>
    </div>
    <div class="score-panel" aria-live="polite">
      <div class="score-count"><span id="scoreValue">0</span>/30</div>
      <div id="scoreMarkers" class="score-markers" aria-label="捕鱼分数"></div>
    </div>
    <div class="creator-badge" title="WeChat · scsocesong" aria-label="WeChat scsocesong">
      <svg class="wechat-icon" viewBox="0 0 48 48" aria-hidden="true">
        <path d="M20.3 12.2c-8.3 0-15 5.2-15 11.7 0 3.7 2.2 7 5.6 9.1l-1.2 4.2 5-2.3c1.6.4 3.3.7 5.1.7 8.3 0 15-5.2 15-11.7s-6.7-11.7-14.5-11.7Z" />
        <path d="M32.1 21.6c6.4.7 11.2 4.8 11.2 10 0 3-1.7 5.7-4.4 7.4l1 3.4-4-1.8c-1.3.3-2.7.5-4.1.5-6.8 0-12.4-4.2-12.4-9.5 0-.8.1-1.6.4-2.3 7.4-.1 13.4-4.4 13.4-9.8 0-.1 0-.1-.1-.1Z" />
        <circle cx="15.6" cy="22.1" r="1.6" />
        <circle cx="25" cy="22.1" r="1.6" />
        <circle cx="28.5" cy="31.2" r="1.3" />
        <circle cx="36.2" cy="31.2" r="1.3" />
      </svg>
      <span>scsocesong</span>
    </div>
    <div id="successBanner" class="success-banner" hidden>捕鱼成功</div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
