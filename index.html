<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雨中荷塘金鱼</title>
    <script>
      if (location.protocol === "file:") {
        location.replace("http://127.0.0.1:5173/");
      }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <div class="hud" aria-label="scene controls">
      <button id="cameraToggle" class="icon-button" type="button" title="开启摄像头挥手">
        <span aria-hidden="true">◉</span>
      </button>
      <button id="rainToggle" class="icon-button" type="button" title="切换雨势">
        <span aria-hidden="true">☂</span>
      </button>
      <button id="soundToggle" class="icon-button" type="button" title="开启音效">
        <span aria-hidden="true">♫</span>
      </button>
    </div>
    <div class="score-panel" aria-live="polite">
      <div class="score-count"><span id="scoreValue">0</span>/6</div>
      <div id="scoreMarkers" class="score-markers" aria-label="捕鱼分数"></div>
    </div>
    <div id="successBanner" class="success-banner" hidden>捕鱼成功</div>
    <video id="gestureVideo" playsinline muted></video>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
